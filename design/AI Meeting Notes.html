<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.3); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.5); }

  /* Noise texture overlay for glass depth */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
    opacity: 0.6;
  }

  #root { position: relative; z-index: 1; }

  /* Selection color */
  ::selection { background: rgba(20,184,166,0.2); }

  /* Input reset */
  input, button, textarea { font-family: inherit; }
  input[type=range] { cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="pages/components.jsx"></script>
<script type="text/babel" src="pages/dashboard.jsx"></script>
<script type="text/babel" src="pages/meetings.jsx"></script>
<script type="text/babel" src="pages/pages.jsx"></script>
<script type="text/babel" src="pages/mobile-layout.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="pages/app.jsx"></script>
</body>
</html>

// ── Tiny components ─────────────────────────────────────────────────
function Avatar({ name = 'U', size = 32 }) {
  const colors = ['#14b8a6','#6366f1','#f59e0b','#ec4899','#3b82f6','#10b981'];
  const c = colors[name.charCodeAt(0) % colors.length];
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', background: `${c}22`, border: `1.5px solid ${c}44`,
      display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: size * 0.38, fontWeight: 600,
      color: c, flexShrink: 0, fontFamily: 'DM Sans, sans-serif' }}>
      {name[0].toUpperCase()}
    </div>
  );
}

function Avatars({ names, size = 26, max = 4 }) {
  const shown = names.slice(0, max);
  const rest = names.length - max;
  const gap = Math.round(size * 0.22);
  return (
    <div style={{ display: 'flex', alignItems: 'center', flexShrink: 0 }}>
      {shown.map((n, i) => (
        <div key={i} style={{
          marginLeft: i === 0 ? 0 : -gap,
          position: 'relative', zIndex: shown.length - i, flexShrink: 0,
          borderRadius: '50%', outline: '2.5px solid rgba(255,255,255,0.95)',
          outlineOffset: '0px',
        }}>
          <Avatar name={n} size={size} />
        </div>
      ))}
      {rest > 0 && (
        <div style={{
          marginLeft: -gap, position: 'relative', zIndex: 0, flexShrink: 0,
          width: size, height: size, borderRadius: '50%',
          background: 'rgba(100,116,139,0.15)', color: '#475569',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: size * 0.34, fontWeight: 600, fontFamily: 'Inter, sans-serif',
          outline: '2.5px solid rgba(255,255,255,0.95)',
        }}>+{rest}</div>
      )}
    </div>
  );
}

function Badge({ children, color = 'teal', dot }) {
  const map = {
    teal:   { bg:'rgba(20,184,166,0.12)',  text:'#0d9488',  d:'#14b8a6' },
    blue:   { bg:'rgba(59,130,246,0.12)',  text:'#2563eb',  d:'#3b82f6' },
    amber:  { bg:'rgba(245,158,11,0.12)',  text:'#d97706',  d:'#f59e0b' },
    red:    { bg:'rgba(239,68,68,0.10)',   text:'#dc2626',  d:'#ef4444' },
    slate:  { bg:'rgba(100,116,139,0.12)', text:'#475569',  d:'#94a3b8' },
    purple: { bg:'rgba(139,92,246,0.12)',  text:'#7c3aed',  d:'#8b5cf6' },
    green:  { bg:'rgba(16,185,129,0.12)',  text:'#059669',  d:'#10b981' },
  };
  const c = map[color] || map.teal;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5, background:c.bg, color:c.text,
      padding:'3px 9px', borderRadius:99, fontSize:12, fontWeight:500, fontFamily:'Inter, sans-serif', whiteSpace:'nowrap' }}>
      {dot && <span style={{ width:6, height:6, borderRadius:'50%', background:c.d, flexShrink:0 }} />}
      {children}
    </span>
  );
}

function Btn({ children, variant='primary', size='md', icon, onClick, style }) {
  const [a, setA] = React.useState(false);
  const sz = { sm:{ padding:'5px 13px', fontSize:12.5 }, md:{ padding:'8px 18px', fontSize:13.5 }, lg:{ padding:'11px 26px', fontSize:14.5 } };
  const vs = {
    primary: { background:`linear-gradient(135deg,${TEAL},#0d9488)`, color:'#fff', border:'none', boxShadow:`0 2px 12px rgba(20,184,166,0.3)` },
    ghost:   { background:'rgba(255,255,255,0.5)', backdropFilter:'blur(12px)', color:'#334155', border:'1px solid rgba(255,255,255,0.7)', boxShadow:'0 1px 4px rgba(0,0,0,0.05)' },
    subtle:  { background:'rgba(20,184,166,0.1)', color:TEAL, border:'none' },
    outline: { background:'transparent', color:TEAL, border:`1px solid ${TEAL}` },
  };
  return (
    <button onClick={onClick} onMouseDown={()=>setA(true)} onMouseUp={()=>setA(false)}
      style={{ ...sz[size], ...vs[variant], borderRadius:10, fontFamily:'Inter,sans-serif', fontWeight:500, cursor:'pointer',
        display:'inline-flex', alignItems:'center', gap:6, transition:'transform 150ms, opacity 150ms',
        transform:a?'scale(0.97)':'scale(1)', outline:'none', whiteSpace:'nowrap', ...style }}>
      {icon && <span style={{ display:'flex' }}>{icon}</span>}{children}
    </button>
  );
}

function GCard({ children, style, onClick }) {
  const [h, setH] = React.useState(false);
  return (
    <div onClick={onClick} onMouseEnter={()=>onClick&&setH(true)} onMouseLeave={()=>setH(false)}
      style={{ ...glass(0.55), borderRadius:16, transition:'transform 250ms, box-shadow 250ms',
        transform: h?'translateY(-2px)':'none', cursor:onClick?'pointer':'default',
        boxShadow: h?'0 6px 32px rgba(0,0,0,0.09), inset 0 1px 0 rgba(255,255,255,0.9)':'0 2px 20px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.9)',
        ...style }}>
      {children}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MEETINGS LIST PAGE
// ══════════════════════════════════════════════════════════════════
function MeetingsPage({ onSelect }) {
  const [search, setSearch]   = React.useState('');
  const [filter, setFilter]   = React.useState('all');
  const [viewMode, setViewMode] = React.useState('list'); // list | grid
  const [focused, setFocused] = React.useState(false);

  const filters = [
    { id:'all', label:'All' },
    { id:'completed', label:'Done' },
    { id:'in-progress', label:'Live' },
    { id:'scheduled', label:'Upcoming' },
  ];

  const shown = MEETINGS.filter(m => {
    const matchFilter = filter === 'all' || m.status === filter;
    const matchSearch = !search || m.title.toLowerCase().includes(search.toLowerCase()) ||
      m.attendees.some(a => a.toLowerCase().includes(search.toLowerCase())) ||
      m.project.toLowerCase().includes(search.toLowerCase());
    return matchFilter && matchSearch;
  });

  const groups = [
    { label: 'Today',     items: shown.filter(m => m.date === 'Today') },
    { label: 'Yesterday', items: shown.filter(m => m.date === 'Yesterday') },
    { label: 'Earlier',   items: shown.filter(m => m.date !== 'Today' && m.date !== 'Yesterday') },
  ].filter(g => g.items.length > 0);

  return (
    <div style={{ height:'100vh', background: BG, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {/* Header */}
      <div style={{ ...glass(0.45), borderBottom:'1px solid rgba(255,255,255,0.6)', borderRadius:0, padding:'20px 32px 0', flexShrink:0 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18 }}>
          <div>
            <div style={{ fontSize:11, fontFamily:'Inter,sans-serif', fontWeight:600, color:TEAL, letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:4 }}>
              {shown.length} meetings
            </div>
            <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:800, fontSize:28, color:'#0f172a', letterSpacing:'-0.02em' }}>
              Meetings
            </div>
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'center', marginTop:4 }}>
            <Btn variant="ghost" size="sm" icon={<Ic.filter />}>Filter</Btn>
            <Btn variant="primary" size="md" icon={<Ic.plus />}>New Recording</Btn>
          </div>
        </div>

        {/* Search + controls row */}
        <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:16 }}>
          <div style={{ flex:1, display:'flex', alignItems:'center', gap:8,
            background: focused?'rgba(255,255,255,0.85)':'rgba(255,255,255,0.55)',
            border: focused?`1px solid ${TEAL}55`:'1px solid rgba(255,255,255,0.7)',
            borderRadius:11, padding:'9px 14px', boxShadow: focused?`0 0 0 3px ${TEAL}12`:'none', transition:'all 200ms' }}>
            <span style={{ color:'#94a3b8', display:'flex', flexShrink:0 }}><Ic.search /></span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search meetings, people, projects…"
              onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}
              style={{ border:'none', background:'transparent', outline:'none', fontSize:13.5, color:'#1e293b', width:'100%' }} />
            {search && <button onClick={()=>setSearch('')} style={{ border:'none',background:'none',cursor:'pointer',color:'#94a3b8',fontSize:16,lineHeight:1,flexShrink:0 }}>×</button>}
          </div>

          {/* Status filters */}
          <div style={{ display:'flex', gap:3, background:'rgba(255,255,255,0.45)', borderRadius:10, padding:3, border:'1px solid rgba(255,255,255,0.65)', flexShrink:0 }}>
            {filters.map(f => (
              <button key={f.id} onClick={()=>setFilter(f.id)} style={{
                padding:'5px 14px', borderRadius:7, border:'none', cursor:'pointer', fontSize:12.5,
                fontFamily:'Inter,sans-serif', fontWeight:500, transition:'all 180ms',
                background: filter===f.id?'rgba(255,255,255,0.95)':'transparent',
                color: filter===f.id?'#0f172a':'#64748b',
                boxShadow: filter===f.id?'0 1px 5px rgba(0,0,0,0.08)':'none',
              }}>{f.label}</button>
            ))}
          </div>

          {/* View toggle */}
          <div style={{ display:'flex', gap:2, background:'rgba(255,255,255,0.45)', borderRadius:8, padding:3, border:'1px solid rgba(255,255,255,0.65)', flexShrink:0 }}>
            {[['list',<Ic.list />],['grid',<Ic.grid />]].map(([mode, ico]) => (

                width:30, height:28, borderRadius:6, border:'none', cursor:'pointer',
                display:'flex', alignItems:'center', justifyContent:'center', transition:'all 180ms',
                background: viewMode===mode?'rgba(255,255,255,0.95)':'transparent',
                color: viewMode===mode?TEAL:'#94a3b8',
                boxShadow: viewMode===mode?'0 1px 4px rgba(0,0,0,0.07)':'none',
              }}>{ico}</button>
            ))}

        </div>

                <div style={{ flex:1, height:1, background:'rgba(148,163,184,0.15)' }} />
                <span style={{ fontWeight:400 }}>{group.items.length}</span>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {group.items.map(m => <MeetingListRow key={m.id} m={m} onSelect={onSelect} />)}
              </div>
            </div>
          ))
        ) : (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(280px,1fr))', gap:14 }}>
            {shown.map(m => <MeetingGridCard key={m.id} m={m} onSelect={onSelect} />)}
          </div>
        )}
        {shown.length === 0 && (
          <div style={{ textAlign:'center', padding:'60px 0', color:'#94a3b8', fontFamily:'Inter,sans-serif' }}>
            <div style={{ fontSize:36, marginBottom:12 }}>🔍</div>
            <div style={{ fontSize:15, fontWeight:500 }}>No meetings found</div>
            <div style={{ fontSize:13, marginTop:4 }}>Try a different search or filter</div>
          </div>
        )}
      </div>
    </div>
  );
}

function MeetingListRow({ m, onSelect }) {
  const [hov, setHov] = React.useState(false);
  const isLive = m.status === 'in-progress';
  return (
    <div onClick={()=>onSelect(m)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ display:'flex', alignItems:'center', gap:14, padding:'13px 16px', borderRadius:14, cursor:'pointer', transition:'all 200ms',
        background: hov?'rgba(255,255,255,0.75)':'rgba(255,255,255,0.5)',
        border: isLive?`1px solid rgba(20,184,166,0.3)`:'1px solid rgba(255,255,255,0.7)',
        boxShadow: isLive?`0 0 0 2px rgba(20,184,166,0.08), ${hov?'0 4px 16px rgba(0,0,0,0.07)':'none'}`:(hov?'0 4px 16px rgba(0,0,0,0.06)':'none'),
        transform: hov?'translateY(-1px)':'none',
      }}>
      {/* Icon */}
      <div style={{ width:42, height:42, borderRadius:11, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center',
        background: isLive?'rgba(20,184,166,0.12)': m.status==='scheduled'?'rgba(99,102,241,0.08)':'rgba(148,163,184,0.1)',
        color: isLive?TEAL: m.status==='scheduled'?'#6366f1':'#94a3b8',
        border: isLive?`1px solid rgba(20,184,166,0.2)`:'1px solid rgba(226,232,240,0.5)' }}>
        <Ic.mic />
      </div>

      {/* Title + meta */}
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:600, fontSize:14.5, color:'#0f172a',
          whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', marginBottom:3 }}>{m.title}</div>
        <div style={{ fontSize:12, color:'#94a3b8', fontFamily:'Inter,sans-serif', display:'flex', gap:10, alignItems:'center' }}>
          <span style={{ display:'flex', alignItems:'center', gap:3 }}><Ic.clock />{m.date === 'Today' || m.date === 'Yesterday' ? m.date+', ' : m.date+' · '}{m.time}</span>
          {m.duration !== '—' && <><span>·</span><span>{m.duration}</span></>}
          {m.tags.slice(0,2).map(t => (
            <span key={t} style={{ padding:'1px 7px', borderRadius:99, background:'rgba(148,163,184,0.1)', fontSize:11, color:'#94a3b8' }}>#{t}</span>
          ))}
        </div>
      </div>

      {/* Right side */}
      <div style={{ display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
        <Avatars names={m.attendees} size={24} max={3} />
        <Badge color={projectColors[m.project]||'slate'}>{m.project}</Badge>
        <Badge color={isLive?'teal':m.status==='scheduled'?'blue':'slate'} dot>
          {isLive?'Live':m.status==='scheduled'?'Upcoming':'Done'}
        </Badge>
        {m.actions > 0 && <Badge color="amber">{m.actions} actions</Badge>}
        <button style={{ width:28,height:28,borderRadius:7,border:'none',background:'transparent',cursor:'pointer',
          display:'flex',alignItems:'center',justifyContent:'center',color:'#cbd5e1',transition:'color 150ms' }}
          onMouseEnter={e=>e.currentTarget.style.color='#64748b'} onMouseLeave={e=>e.currentTarget.style.color='#cbd5e1'}>
          <Ic.more />
        </button>
      </div>
    </div>
  );
}

function MeetingGridCard({ m, onSelect }) {
  const isLive = m.status === 'in-progress';
  return (
    <GCard onClick={()=>onSelect(m)} style={{ padding:20, borderTop: isLive?`3px solid ${TEAL}`:'3px solid transparent' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12 }}>
        <Badge color={projectColors[m.project]||'slate'}>{m.project}</Badge>
        <Badge color={isLive?'teal':m.status==='scheduled'?'blue':'slate'} dot>
          {isLive?'Live':m.status==='scheduled'?'Upcoming':'Done'}
        </Badge>
      </div>
      <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:700, fontSize:15, color:'#0f172a', lineHeight:1.35, marginBottom:8 }}>{m.title}</div>
      <div style={{ fontSize:12, color:'#64748b', fontFamily:'Inter,sans-serif', marginBottom:14, display:'flex', gap:8 }}>
        <span style={{ display:'flex', alignItems:'center', gap:3 }}><Ic.clock />{m.time}</span>
        <span>·</span><span>{m.duration}</span>
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <Avatars names={m.attendees} size={26} max={4} />
        {m.actions > 0 && <Badge color="amber">{m.actions} actions</Badge>}
      </div>
    </GCard>
  );
}

// ══════════════════════════════════════════════════════════════════
// MEETING DETAIL PAGE
// ══════════════════════════════════════════════════════════════════
function DetailPage({ meeting, onBack }) {
  const [actions, setActions] = React.useState(ACTIONS_LIST);
  const [activeTab, setActiveTab] = React.useState('transcript');
  const [editingTitle, setEditingTitle] = React.useState(false);
  const [title, setTitle] = React.useState(meeting.title);
  const [highlight, setHighlight] = React.useState(null);
  const toggleAction = id => setActions(prev => prev.map(a => a.id===id ? {...a,done:!a.done} : a));
  const tabs = ['transcript','summary','actions','attendees'];
  const openCount = actions.filter(a=>!a.done).length;

  return (
    <div style={{ height:'100vh', background: BG, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {/* Top bar */}
      <div style={{ ...glass(0.5), borderBottom:'1px solid rgba(255,255,255,0.6)', borderRadius:0, padding:'0 28px', flexShrink:0, height:62, display:'flex', alignItems:'center', gap:16 }}>
        <button onClick={onBack} style={{ display:'flex',alignItems:'center',gap:6,background:'rgba(255,255,255,0.5)',
          border:'1px solid rgba(255,255,255,0.7)',borderRadius:9,padding:'6px 12px',cursor:'pointer',
          color:'#475569',fontFamily:'Inter,sans-serif',fontSize:13,fontWeight:500,transition:'all 180ms' }}
          onMouseEnter={e=>{e.currentTarget.style.background='rgba(255,255,255,0.8)';}}
          onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.5)';}}>
          <Ic.back /> Meetings
        </button>

        {/* Title — editable */}
        <div style={{ flex:1, minWidth:0 }}>
          {editingTitle ? (
            <input value={title} onChange={e=>setTitle(e.target.value)} onBlur={()=>setEditingTitle(false)} autoFocus
              style={{ fontFamily:'DM Sans,sans-serif', fontWeight:700, fontSize:16, color:'#0f172a', border:'none',
                background:'transparent', outline:`2px solid ${TEAL}55`, borderRadius:6, padding:'2px 6px', width:'100%' }} />
          ) : (
            <div style={{ display:'flex', alignItems:'center', gap:8, cursor:'text' }} onClick={()=>setEditingTitle(true)}>
              <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:700, fontSize:16, color:'#0f172a',
                whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{title}</div>
              <span style={{ color:'#cbd5e1', display:'flex', flexShrink:0 }}><Ic.edit /></span>
            </div>
          )}
          <div style={{ fontSize:12, color:'#94a3b8', fontFamily:'Inter,sans-serif', display:'flex', gap:8, alignItems:'center', marginTop:1 }}>
            <span>{meeting.date}, {meeting.time}</span><span>·</span><span>{meeting.duration}</span>
            <span>·</span><Avatars names={meeting.attendees} size={16} max={4} />
          </div>
        </div>

        {/* Badges */}
        <div style={{ display:'flex', gap:6, alignItems:'center', flexShrink:0 }}>
          <Badge color={projectColors[meeting.project]||'slate'}>{meeting.project}</Badge>
          <Badge color={meeting.status==='in-progress'?'teal':meeting.status==='scheduled'?'blue':'green'} dot>
            {meeting.status==='in-progress'?'Live':meeting.status==='scheduled'?'Upcoming':'Completed'}
          </Badge>
          {openCount > 0 && <Badge color="amber">{openCount} open actions</Badge>}
        </div>

        {/* Action buttons */}
        <div style={{ display:'flex', gap:6, flexShrink:0 }}>
          <Btn variant="ghost" size="sm" icon={<Ic.share />}>Share</Btn>
          <Btn variant="ghost" size="sm" icon={<Ic.download />}>Export</Btn>
          <Btn variant="subtle" size="sm" icon={<Ic.ai />}>Re-summarize</Btn>
        </div>
      </div>

      {/* Tab bar */}
      <div style={{ ...glass(0.35), borderBottom:'1px solid rgba(255,255,255,0.5)', borderRadius:0, padding:'0 28px', flexShrink:0, display:'flex', alignItems:'center', gap:4 }}>
        {tabs.map(t => (
          <button key={t} onClick={()=>setActiveTab(t)} style={{
            padding:'12px 18px', borderRadius:0, border:'none', cursor:'pointer',
            fontFamily:'Inter,sans-serif', fontSize:13.5, fontWeight: activeTab===t?600:400, transition:'all 180ms',
            background:'transparent', color: activeTab===t?'#0f172a':'#64748b',
            borderBottom: activeTab===t?`2px solid ${TEAL}`:'2px solid transparent',
          }}>
            {t.charAt(0).toUpperCase()+t.slice(1)}
            {t==='actions' && <span style={{ marginLeft:6, background:openCount>0?'rgba(245,158,11,0.15)':'rgba(16,185,129,0.12)', color:openCount>0?'#d97706':'#059669', borderRadius:99, padding:'1px 6px', fontSize:11, fontWeight:600 }}>{openCount}</span>}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ flex:1, overflow:'hidden', display:'flex' }}>

        {/* TRANSCRIPT TAB */}
        {activeTab==='transcript' && (
          <div style={{ flex:1, overflowY:'auto', padding:'24px 28px', display:'flex', gap:20 }}>
            {/* Transcript */}
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18 }}>
                <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:700, fontSize:16, color:'#0f172a' }}>Transcript</div>
                <Btn variant="ghost" size="sm">Edit transcript</Btn>
              </div>
              {TRANSCRIPT_LINES.map((t, i) => (
                <div key={i} style={{ display:'flex', gap:12, marginBottom:20,
                  opacity: highlight && highlight !== t.speaker ? 0.4 : 1, transition:'opacity 200ms' }}>
                  <div style={{ flexShrink:0, marginTop:2 }}><Avatar name={t.speaker} size={32} /></div>
                  <div style={{ flex:1 }}>
                    <div style={{ display:'flex', gap:10, alignItems:'baseline', marginBottom:5 }}>
                      <span style={{ fontFamily:'Inter,sans-serif', fontWeight:600, fontSize:13, color:'#1e293b', cursor:'pointer' }}
                        onClick={()=>setHighlight(h=>h===t.speaker?null:t.speaker)}>{t.speaker}</span>
                      <span style={{ fontSize:11.5, color:'#94a3b8', fontFamily:'Inter,sans-serif' }}>{t.time}</span>
                    </div>
                    <div style={{ fontSize:14, color:'#475569', fontFamily:'Inter,sans-serif', lineHeight:1.7,
                      padding:'10px 14px', background:'rgba(255,255,255,0.45)', borderRadius:10, border:'1px solid rgba(226,232,240,0.4)' }}>
                      {t.text}
                    </div>
                  </div>
                </div>
              ))}
            </div>

            {/* Sidebar — AI + quick actions */}
            <div style={{ width:280, flexShrink:0, display:'flex', flexDirection:'column', gap:14 }}>
              <GCard style={{ padding:16, background:'linear-gradient(135deg,rgba(20,184,166,0.1),rgba(99,102,241,0.06))' }}>
                <div style={{ display:'flex', gap:8, alignItems:'flex-start', marginBottom:8 }}>
                  <div style={{ width:28,height:28,borderRadius:8,background:'rgba(20,184,166,0.15)',display:'flex',alignItems:'center',justifyContent:'center',color:TEAL,flexShrink:0 }}><Ic.ai /></div>
                  <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:700, fontSize:13, color:'#0f172a' }}>AI Insight</div>
                </div>
                <div style={{ fontSize:12.5, color:'#475569', fontFamily:'Inter,sans-serif', lineHeight:1.65 }}>
                  Carol owns 2 of 5 actions. Dan's API endpoint is on the critical path — delay risks the entire v2.3 timeline.
                </div>
              </GCard>
              <GCard style={{ padding:16 }}>
                <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:600, fontSize:13, color:'#0f172a', marginBottom:10 }}>Quick Actions</div>
                {actions.slice(0,4).map(a => (
                  <div key={a.id} onClick={()=>toggleAction(a.id)} style={{ display:'flex', gap:8, padding:'6px 0', cursor:'pointer', alignItems:'flex-start',
                    borderBottom:'1px solid rgba(148,163,184,0.1)' }}>
                    <div style={{ width:15,height:15,borderRadius:4,border:`1.5px solid ${a.done?TEAL:'#cbd5e1'}`,marginTop:2,flexShrink:0,
                      background:a.done?TEAL:'transparent',display:'flex',alignItems:'center',justifyContent:'center',color:'white',transition:'all 180ms' }}>
                      {a.done && <Ic.check />}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:12.5,fontFamily:'Inter,sans-serif',color:a.done?'#94a3b8':'#1e293b',textDecoration:a.done?'line-through':'none' }}>{a.text}</div>
                      <div style={{ fontSize:11,color:'#94a3b8',marginTop:1 }}>{a.assignee}</div>
                    </div>
                  </div>
                ))}
              </GCard>
            </div>
          </div>
        )}

        {/* SUMMARY TAB */}
        {activeTab==='summary' && (
          <div style={{ flex:1, overflowY:'auto', padding:'28px 32px' }}>
            <div style={{ maxWidth:720, margin:'0 auto' }}>
              <GCard style={{ padding:'24px 28px', marginBottom:20, background:'linear-gradient(135deg,rgba(20,184,166,0.07),rgba(99,102,241,0.04))' }}>
                <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:14 }}>
                  <div style={{ width:32,height:32,borderRadius:9,background:'rgba(20,184,166,0.15)',display:'flex',alignItems:'center',justifyContent:'center',color:TEAL }}><Ic.ai /></div>
                  <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:700, fontSize:15, color:'#0f172a' }}>AI-Generated Summary</div>
                  <Badge color="teal">Auto</Badge>
                </div>
                <div style={{ fontSize:14.5, color:'#334155', fontFamily:'Inter,sans-serif', lineHeight:1.8 }}>
                  The team aligned on the <strong>v2.3 product scope</strong>, settling on three core deliverables: a redesigned onboarding flow, design token migration, and AI summary improvements. The overall timeline is set at <strong>six weeks</strong> with a formal checkpoint at week two to assess any blockers — particularly around legacy component migration.
                </div>
              </GCard>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:20 }}>
                {[
                  { label:'Key Decisions', color:'#6366f1', items:['v2.3 scoped to 3 features','6-week delivery timeline','Week-2 checkpoint set','Beta group of 5 customers'] },
                  { label:'Risks & Blockers', color:'#f59e0b', items:['Token migration may take 2 weeks','Legacy component blockers','QA needs earlier involvement'] },
                ].map(section => (
                  <GCard key={section.label} style={{ padding:18 }}>
                    <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:700, fontSize:13.5, color:'#0f172a', marginBottom:12, display:'flex', alignItems:'center', gap:8 }}>
                      <div style={{ width:8,height:8,borderRadius:'50%',background:section.color }} />
                      {section.label}
                    </div>
                    {section.items.map((item,i) => (
                      <div key={i} style={{ fontSize:13,fontFamily:'Inter,sans-serif',color:'#475569',padding:'5px 0',borderBottom:i<section.items.length-1?'1px solid rgba(148,163,184,0.1)':'none',lineHeight:1.5 }}>
                        {item}
                      </div>
                    ))}
                  </GCard>
                ))}
              </div>
              <GCard style={{ padding:18 }}>
                <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:700, fontSize:13.5, color:'#0f172a', marginBottom:12 }}>Next Steps</div>
                {actions.map(a => (
                  <div key={a.id} onClick={()=>toggleAction(a.id)} style={{ display:'flex', alignItems:'center', gap:12, padding:'9px 0',
                    borderBottom:'1px solid rgba(148,163,184,0.08)', cursor:'pointer' }}>
                    <div style={{ width:17,height:17,borderRadius:5,border:`1.5px solid ${a.done?TEAL:'#cbd5e1'}`,flexShrink:0,
                      background:a.done?TEAL:'transparent',display:'flex',alignItems:'center',justifyContent:'center',color:'white',transition:'all 180ms' }}>
                      {a.done && <Ic.check />}
                    </div>
                    <div style={{ flex:1, fontSize:13.5, fontFamily:'Inter,sans-serif', color:a.done?'#94a3b8':'#1e293b', textDecoration:a.done?'line-through':'none' }}>{a.text}</div>
                    <div style={{ fontSize:12, color:'#94a3b8' }}>{a.assignee} · {a.due}</div>
                    <Badge color={a.priority==='high'?'red':a.priority==='medium'?'amber':'slate'}>{a.priority}</Badge>
                  </div>
                ))}
              </GCard>
            </div>
          </div>
        )}

        {/* ACTIONS TAB */}
        {activeTab==='actions' && (
          <div style={{ flex:1, overflowY:'auto', padding:'24px 28px' }}>
            <div style={{ maxWidth:700, margin:'0 auto' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18 }}>
                <div>
                  <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:700, fontSize:18, color:'#0f172a' }}>Action Items</div>
                  <div style={{ fontSize:13, color:'#64748b', fontFamily:'Inter,sans-serif', marginTop:2 }}>{openCount} open · {actions.length - openCount} completed</div>
                </div>
                <Btn variant="primary" size="sm" icon={<Ic.plus />}>Add Action</Btn>
              </div>
              <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                {actions.map(a => (
                  <div key={a.id} onClick={()=>toggleAction(a.id)} style={{ display:'flex', alignItems:'center', gap:14, padding:'14px 18px',
                    borderRadius:14, cursor:'pointer', transition:'all 200ms',
                    background: a.done?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.6)',
                    border: a.done?'1px solid rgba(226,232,240,0.4)':`1px solid ${a.priority==='high'?'rgba(239,68,68,0.15)':'rgba(255,255,255,0.75)'}`,
                    boxShadow: a.done?'none':'0 1px 8px rgba(0,0,0,0.04)' }}>
                    <div style={{ width:20,height:20,borderRadius:6,border:`2px solid ${a.done?TEAL:'#cbd5e1'}`,flexShrink:0,
                      background:a.done?TEAL:'transparent',display:'flex',alignItems:'center',justifyContent:'center',color:'white',transition:'all 180ms' }}>
                      {a.done && <Ic.check />}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:14,fontFamily:'Inter,sans-serif',fontWeight:500,color:a.done?'#94a3b8':'#1e293b',textDecoration:a.done?'line-through':'none' }}>{a.text}</div>
                      <div style={{ fontSize:12,color:'#94a3b8',marginTop:3,fontFamily:'Inter,sans-serif',display:'flex',gap:8 }}>
                        <span>From transcript at {a.source}</span><span>·</span><span>{a.assignee}</span>
                      </div>
                    </div>
                    <div style={{ display:'flex', gap:8, alignItems:'center', flexShrink:0 }}>
                      <span style={{ fontSize:12, color:'#94a3b8', fontFamily:'Inter,sans-serif' }}>Due {a.due}</span>
                      <Avatar name={a.assignee} size={26} />
                      <Badge color={a.priority==='high'?'red':a.priority==='medium'?'amber':'slate'}>{a.priority}</Badge>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ATTENDEES TAB */}
        {activeTab==='attendees' && (
          <div style={{ flex:1, overflowY:'auto', padding:'24px 28px' }}>
            <div style={{ maxWidth:600, margin:'0 auto' }}>
              <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:700, fontSize:18, color:'#0f172a', marginBottom:18 }}>Attendees</div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))', gap:14 }}>
                {meeting.attendees.map(name => {
                  const myActions = actions.filter(a => a.assignee === name);
                  const open = myActions.filter(a=>!a.done).length;
                  return (
                    <GCard key={name} style={{ padding:20, textAlign:'center' }}>
                      <div style={{ display:'flex', justifyContent:'center', marginBottom:12 }}><Avatar name={name} size={52} /></div>
                      <div style={{ fontFamily:'DM Sans,sans-serif', fontWeight:700, fontSize:15, color:'#0f172a', marginBottom:4 }}>{name}</div>
                      {myActions.length > 0
                        ? <Badge color={open>0?'amber':'teal'}>{open>0?`${open} open action`:'All done'}</Badge>
                        : <span style={{ fontSize:12, color:'#94a3b8', fontFamily:'Inter,sans-serif' }}>No actions</span>
                      }
                    </GCard>
                  );
                })}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════════
function App() {
  const [selected, setSelected] = React.useState(null);
  return selected
    ? <DetailPage meeting={selected} onBack={()=>setSelected(null)} />
    : <MeetingsPage onSelect={setSelected} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
